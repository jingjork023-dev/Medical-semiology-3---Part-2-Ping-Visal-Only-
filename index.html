                    { q: "Misoprostol pregnancy contraindication:", a: ["Constipation", "Absorption", "Causes miscarriages", "Alcohol levels"], c: 2 },
                    { q: "Primary goal of treatment:", a: ["Increase acid", "Relieve pain, heal, prevent complications", "Identify blood group", "Weight loss"], c: 1 },
                    { q: "Major complication:", a: ["Perforation", "Hypertension", "Diabetes", "Hearing loss"], c: 0 }
                ]
            }
        };

        let currentCategory = "";
        let currentQuestionIndex = 0;
        let score = 0;

        function init() {
            const home = document.getElementById('home-screen');
            Object.keys(quizData).forEach(key => {
                const card = document.createElement('div');
                card.className = "quiz-card bg-white p-6 rounded-2xl shadow-sm border border-slate-200 cursor-pointer hover:shadow-md hover:border-blue-300 group";
                card.onclick = () => startQuiz(key);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-blue-50 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                            </svg>
                        </div>
                        <span class="text-xs font-bold text-slate-400">20 QUESTIONS</span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 mb-1">${quizData[key].title}</h3>
                    <p class="text-sm text-slate-500">Comprehensive semiology and management quiz.</p>
                `;
                home.appendChild(card);
            });
        }

        function startQuiz(key) {
            currentCategory = key;
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.add('hidden');
            document.getElementById('quiz-interface').classList.remove('hidden');
            document.getElementById('category-title').innerText = quizData[key].title;
            loadQuestion();
        }

        function showHome() {
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('quiz-interface').classList.add('hidden');
            document.getElementById('results-screen').classList.add('hidden');
        }

        function loadQuestion() {
            const data = quizData[currentCategory].questions[currentQuestionIndex];
            document.getElementById('progress-text').innerText = `Question ${currentQuestionIndex + 1}/${quizData[currentCategory].questions.length}`;
            document.getElementById('question-text').innerText = data.q;
            
            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = '';
            
            data.a.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-700 font-medium hover:border-blue-200 hover:bg-white focus:outline-none";
                btn.innerText = option;
                btn.onclick = () => handleAnswer(index);
                optionsList.appendChild(btn);
            });

            document.getElementById('feedback-area').classList.add('hidden');
        }

        function handleAnswer(selectedIndex) {
            const data = quizData[currentCategory].questions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach(btn => btn.disabled = true);
            
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackBox = document.getElementById('feedback-box');
            feedbackArea.classList.remove('hidden');

            if (selectedIndex === data.c) {
                score++;
                buttons[selectedIndex].classList.replace('border-slate-100', 'border-green-500');
                buttons[selectedIndex].classList.add('bg-green-50');
                feedbackBox.className = "p-4 rounded-xl mb-4 bg-green-100 text-green-800 font-bold";
                feedbackBox.innerHTML = "✓ Correct Answer!";
            } else {
                buttons[selectedIndex].classList.replace('border-slate-100', 'border-red-500');
                buttons[selectedIndex].classList.add('bg-red-50');
                buttons[data.c].classList.replace('border-slate-100', 'border-green-500');
                buttons[data.c].classList.add('bg-green-50');
                feedbackBox.className = "p-4 rounded-xl mb-4 bg-red-100 text-red-800 font-bold";
                feedbackBox.innerHTML = `✗ Incorrect. The correct answer was: ${data.a[data.c]}`;
            }

            document.getElementById('next-btn').onclick = nextQuestion;
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData[currentCategory].questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-interface').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');
            const total = quizData[currentCategory].questions.length;
            document.getElementById('final-score-text').innerText = `${score}/${total}`;
            
            const percentage = (score / total) * 100;
            let msg = "";
            if (percentage >= 90) msg = "Exceptional! Superior clinical knowledge.";
            else if (percentage >= 70) msg = "Great job! Strong understanding of the material.";
            else if (percentage >= 50) msg = "Passed. Good effort, but review recommended.";
            else msg = "Keep studying. Focus on the semiology details.";
            
            document.getElementById('performance-msg').innerText = msg;
        }

        window.onload = init;
    </script>
</body>
</html>
